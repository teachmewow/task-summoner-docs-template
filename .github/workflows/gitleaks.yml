name: gitleaks

# Scans PR diffs for committed secrets. Blocks merge if anything looks
# like an API key, token, or credential.
#
# The companion `.pre-commit-config.yaml` runs the same scanner locally
# so most leaks are caught before they ever reach CI.

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: Scan PR diff for secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          # Full history so gitleaks can diff base..head precisely.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Scan only what this PR introduces, not the entire history.
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_CONFIG: .gitleaks.toml
